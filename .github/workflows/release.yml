name: Release Firmware

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: rust-src, llvm-tools

      # Prebuilt binaries where available; falls back to cargo install.
      - name: Install flip-link and cargo-binutils
        uses: taiki-e/install-action@v2
        with:
          tool: flip-link,cargo-binutils

      # Restores the registry, git checkouts, and build-std artifacts from
      # the CI caches built on main, so tag builds do not start cold.
      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2

      - name: Build ANSI firmware
        run: |
          cargo objcopy --release --locked --features ansi_layout -- -O binary keychron-q6-he-rmk-ansi-${{ github.ref_name }}.bin

      - name: Build ISO firmware
        run: |
          cargo objcopy --release --locked --features iso_layout -- -O binary keychron-q6-he-rmk-iso-${{ github.ref_name }}.bin

      - name: Build JIS firmware
        run: |
          cargo objcopy --release --locked --features jis_layout -- -O binary keychron-q6-he-rmk-jis-${{ github.ref_name }}.bin

      - name: Generate checksums
        run: sha256sum keychron-q6-he-rmk-*-${{ github.ref_name }}.bin > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## Keychron Q6 HE - RMK Firmware ${{ github.ref_name }}

            ### Included Builds
            | File                                                 | Layout |
            |------------------------------------------------------|--------|
            | `keychron-q6-he-rmk-ansi-${{ github.ref_name }}.bin` | ANSI   |
            | `keychron-q6-he-rmk-iso-${{ github.ref_name }}.bin`  | ISO    |
            | `keychron-q6-he-rmk-jis-${{ github.ref_name }}.bin`  | JIS    |

            Download the `.bin` file matching your layout from the assets below.
            Verify downloads with `sha256sum -c SHA256SUMS`.

            ---

            ### Flashing (Prebuilt)
            1. Put your keyboard into DFU mode: pop off the space bar keycap and hold the reset button underneath it while plugging in the cable.
            2. Find your MCU's serial number:
            ```sh
            dfu-util -l
            ```
            3. Flash the firmware:
            ```sh
            dfu-util -a 0 -s 0x08000000:mass-erase:force:leave \
              -D keychron-q6-he-rmk-<layout>-${{ github.ref_name }}.bin \
              -S <serial number>
            ```

            ---

            ### Building & Flashing from Source
            ```sh
            cargo install cargo-make   # first time only
            cargo make install         # install required tools (first time only)
            cargo make flash-ansi      # or flash-iso / flash-jis, matching your layout
            ```
          files: |
            keychron-q6-he-rmk-ansi-${{ github.ref_name }}.bin
            keychron-q6-he-rmk-iso-${{ github.ref_name }}.bin
            keychron-q6-he-rmk-jis-${{ github.ref_name }}.bin
            SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
