name: Release Firmware

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: rust-src

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-make
        run: cargo install cargo-make

      - name: Install all required tools
        run: cargo make install

      - name: Build firmware (release)
        run: cargo build --release

      - name: Produce .bin artifact
        run: cargo make objcopy

      - name: Produce .hex artifact
        run: cargo objcopy --release -- -O ihex rmk.hex

      - name: Produce .uf2 artifact
        run: cargo make uf2

      - name: Rename artifacts with version tag
        run: |
          TAG="${{ github.ref_name }}"
          mv rmk.bin "rmk-q6_he_ansi-${TAG}.bin"
          mv rmk.hex "rmk-q6_he_ansi-${TAG}.hex"
          mv rmk.uf2 "rmk-q6_he_ansi-${TAG}.uf2"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Q6 HE ANSI ${{ github.ref_name }}"
          body: |
            ## Keychron Q6 HE ANSI Firmware ${{ github.ref_name }}

            ### Flashing

            Install all required host tools (only needed once):
            ```sh
            cargo make install
            ```

            Put the keyboard into DFU mode by holding the reset button, then flash:
            ```sh
            cargo make flash
            ```
            
            **probe-rs (debug probe):**
            ```sh
            cargo run --release
            ```
          files: |
            rmk-q6_he_ansi-${{ github.ref_name }}.bin
            rmk-q6_he_ansi-${{ github.ref_name }}.hex
            rmk-q6_he_ansi-${{ github.ref_name }}.uf2
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}