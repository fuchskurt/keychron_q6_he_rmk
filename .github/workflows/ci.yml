name: CI

# Merge gate: runs on every pull request (and pushes to main) so clippy
# drift and logic regressions surface in review instead of silently rotting.
# The project tracks the latest nightly, so this is the safety net for that
# choice. Mark the jobs below as required in branch protection to block
# merges on failure.
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Nightly rustfmt: rustfmt.toml uses nightly-only options.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  check:
    name: Clippy & build (${{ matrix.features }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        features: [ansi_layout, iso_layout, jis_layout]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rust-src
          targets: thumbv7em-none-eabihf

      # Prebuilt binary where available; falls back to cargo install.
      - name: Install flip-link
        uses: taiki-e/install-action@v2
        with:
          tool: flip-link

      # Caches the cargo registry, the embassy/rmk git checkouts, and the
      # build-std artifacts in target/, which dominate cold-build time.
      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}

      # --locked: fail loudly if Cargo.lock is out of sync instead of
      # silently floating the git dependencies to new upstream commits.
      - name: Clippy
        run: cargo clippy --release --locked --features ${{ matrix.features }}

      # Runs in the same job as clippy so it reuses the dependency
      # artifacts in target/ and only adds codegen and linking, instead of
      # paying a second full dependency compile in a separate job with its
      # own cache.
      - name: Build firmware
        run: cargo build --release --locked --features ${{ matrix.features }}
