name: Tests

# Runs the q6-core host test suite on every push to any branch, so the
# logic under `q6-core/src/` is verified before any firmware build
# happens. Pull-request branches also get the heavier `ci.yml` matrix
# (clippy + firmware build for all three layouts); this workflow is the
# fast feedback path that runs on every commit.
on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: q6-core host tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: thumbv7em-none-eabihf

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run host tests
        # Run from outside the repository so the workspace
        # `.cargo/config.toml` (which forces `build-std` and the
        # thumbv7em target for the firmware) does not apply. q6-core is
        # pure `no_std` and its tests link the host `std`, which
        # conflicts with `build-std` rebuilding `core`.
        working-directory: ${{ runner.temp }}
        run: cargo test --manifest-path "$GITHUB_WORKSPACE/q6-core/Cargo.toml"
