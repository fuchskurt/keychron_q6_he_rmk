name: Deploy Docs

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: rust-src

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      - name: Install flip-link
        run: cargo install flip-link

      - name: Build docs
        run: |
          cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "--default-theme dark"

      - name: Add redirect at root
        run: |
          echo '<meta http-equiv="refresh" content="0; url=rmk_q6_he_ansi">' \
            > target/thumbv7em-none-eabihf/doc/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/thumbv7em-none-eabihf/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4