cargo-features = ["panic-immediate-abort"]

[package]
name = "rmk-q6_he_ansi"
version = "1.0.0"
description = "Keychron Q6 HE ANSI keyboard firmware written in Rust using RMK and Embassy"
homepage = "https://github.com/fuchskurt/keychron_q6_he_rmk"
repository = "https://github.com/fuchskurt/keychron_q6_he_rmk"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
embassy-time = { features = ["tick-hz-32_768"], git = "https://github.com/fuchskurt/embassy.git" }
embassy-stm32 = { features = ["stm32f401rc", "memory-x", "time-driver-any", "exti", "unstable-pac"], git = "https://github.com/fuchskurt/embassy.git" }
embassy-executor = { features = ["platform-cortex-m", "executor-thread"], git = "https://github.com/fuchskurt/embassy.git" }
embedded-storage-async = "0.4"
rmk = { default-features = false, features = ["async_matrix", "storage", "vial", "vial_lock"], git = "https://github.com/HaoboGu/rmk.git" }
static_cell = "2.1"

[patch.crates-io]
embassy-time = { git = "https://github.com/fuchskurt/embassy.git" }
embassy-time-driver = { git = "https://github.com/fuchskurt/embassy.git" }
embassy-executor = { git = "https://github.com/fuchskurt/embassy.git" }
embassy-sync = { git = "https://github.com/fuchskurt/embassy.git" }
embassy-futures = { git = "https://github.com/fuchskurt/embassy.git" }
embassy-usb = { git = "https://github.com/fuchskurt/embassy.git" }

[build-dependencies]
lzma-rust2 = "*"
serde_json = { version = "*", features = ["preserve_order"] }

[[bin]]
name = "rmk-q6_he_ansi"
test = false
bench = false

[profile.release]
codegen-units = 1
debug = false
strip = "symbols"
opt-level = "s"
overflow-checks = false
lto = "fat"
panic = "immediate-abort"