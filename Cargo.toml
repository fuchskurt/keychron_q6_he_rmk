cargo-features = ["panic-immediate-abort"]

[package]
name = "rmk-q6_he_ansi"
version = "1.0.0"
description = "Keyboard firmware written in Rust"
homepage = "https://github.com/haobogu/rmk"
repository = "https://github.com/haobogu/rmk"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
cortex-m = { version = "0.7", features = ['critical-section-single-core'] }
cortex-m-rt = "0.7"
embassy-time = { version = "0.5", features = ["tick-hz-32_768"] }
embassy-stm32 = { version = "0.6", features = ["stm32f401rc", "memory-x", "time-driver-any", "exti", "unstable-pac"] }
embassy-executor = { version = "0.10", features = ["platform-cortex-m", "executor-thread"] }
embedded-storage = "0.3"
rmk = { version = "*", default-features = false, features = ["async_matrix", "storage", "vial", "vial_lock"], git = "https://github.com/HaoboGu/rmk.git" }
static_cell = "2.1"

[build-dependencies]
xz2 = "*"
json = "*"
const-gen = "*"

[[bin]]
name = "rmk-q6_he_ansi"
test = false
bench = false

[profile.dev]
codegen-units = 1      # better optimizations
debug = true
opt-level = 1
overflow-checks = true
lto = false
panic = 'unwind'

[profile.release]
codegen-units = 1       # better optimizations
debug = false
strip = "symbols"
opt-level = "s"         # optimize for binary size, can also use "z" for smallest binary
overflow-checks = false
lto = "fat"
panic = "immediate-abort"
