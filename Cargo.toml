cargo-features = ["panic-immediate-abort"]

[package]
name = "rmk-q6_he_ansi"
version = "1.0.0"
description = "Keychron Q6 HE ANSI keyboard firmware written in Rust using RMK and Embassy"
homepage = "https://github.com/fuchskurt/keychron_q6_he_rmk"
repository = "https://github.com/fuchskurt/keychron_q6_he_rmk"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
embassy-time = { version = "0.5", features = ["tick-hz-32_768"] }
embassy-stm32 = { version = "0.6", features = ["stm32f401rc", "memory-x", "time-driver-any", "exti", "unstable-pac"] }
embassy-executor = { version = "0.10", features = ["platform-cortex-m", "executor-thread"] }
embedded-storage = "0.3"
rmk = { version = "*", default-features = false, features = ["async_matrix", "storage", "vial", "vial_lock"], git = "https://github.com/HaoboGu/rmk.git" }
static_cell = "2.1"

[build-dependencies]
lzma-rs = "*"
json = "*"

[[bin]]
name = "rmk-q6_he_ansi"
test = false
bench = false

[profile.dev]
codegen-units = 1
debug = true
opt-level = 1
overflow-checks = true
lto = false
panic = "unwind"

[profile.release]
codegen-units = 1
debug = false
strip = "symbols"
opt-level = "s"
overflow-checks = false
lto = "fat"
panic = "immediate-abort"